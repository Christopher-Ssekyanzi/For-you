        h1 { font-size: 4.5rem; font-weight: 700; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        #typewriter { font-size: 1.8rem; color: var(--accent-color); min-height: 1.5em; }
        .gallery-section { padding: 80px 0; background: #161616; }
        .owl-carousel .item { padding: 10px; }
