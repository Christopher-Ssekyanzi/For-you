
<!DOCTYPE html>
<html lang='en' data-theme='dark'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>For Gloria</title>
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
    <style>
        :root { 
            --bg-color: #0f0f0f; 
            --text-color: #e0e0e0; 
            --accent-color: #ff8fa3; 
            --card-bg: #161616; 
            --transition: all 0.3s ease;
        }

        [data-theme='light'] { 
            --bg-color: #f8f9fa; 
            --text-color: #212529; 
            --accent-color: #d63384; 
            --card-bg: #ffffff; 
        }

        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; transition: var(--transition); overflow-x: hidden; }

        .theme-toggle { position: fixed; top: 20px; right: 20px; z-index: 3000; padding: 10px; border-radius: 50%; background: var(--accent-color); border: none; cursor: pointer; font-size: 1.2rem; }

        /* Side Gallery Styles */
        #memorySidebar { height: 100%; width: 0; position: fixed; z-index: 4000; top: 0; left: 0; background: var(--card-bg); overflow-x: hidden; transition: 0.5s; border-right: 2px solid var(--accent-color); padding-top: 60px; }
        .side-tab-trigger { position: fixed; left: 0; top: 50%; transform: translateY(-50%); z-index: 2500; background: var(--accent-color); color: #000; padding: 25px 12px; cursor: pointer; writing-mode: vertical-rl; border-radius: 0 10px 10px 0; font-weight: bold; border: none; }
        .closebtn { position: absolute; top: 10px; right: 25px; font-size: 36px; color: var(--text-color); text-decoration: none; }

        .hero { height: 80vh; background: url('Gloria_1.jpeg') center/cover no-repeat; display: flex; align-items: center; justify-content: center; position: relative; }
        .hero::before { content: ''; position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.4); }
        .hero-content { position: relative; z-index: 10; text-align: center; color: white; }

        .flip-card { background-color: transparent; width: 100%; height: 350px; perspective: 1000px; margin-bottom: 30px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card:hover .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .flip-card-front { background: var(--card-bg); border: 1px solid var(--accent-color); }
        .flip-card-back { background: var(--accent-color); color: #000; transform: rotateY(180deg); }

        .gallery-container-inner { padding: 20px; text-align: center; }
        #gallery-media-container img, #gallery-media-container video { width: 100%; max-height: 400px; object-fit: contain; border-radius: 10px; border: 1px solid var(--accent-color); }

        .btn-custom { background: var(--accent-color); color: #000; font-weight: bold; border-radius: 30px; padding: 10px 25px; border: none; cursor: pointer; transition: 0.3s; margin: 5px; }
    </style>
</head>
<body>
    <button class='theme-toggle' onclick='toggleTheme()'>🌓</button>
    <button class='side-tab-trigger' onclick='openNav()'>✨ GALLERY</button>

    <div id='memorySidebar' class='sidebar'>
        <a href='javascript:void(0)' class='closebtn' onclick='closeNav()'>&times;</a>
        <div class='gallery-container-inner'>
            <h3 class='mb-4'>Our Memories</h3>
            <div id='gallery-media-container'></div>
            <div class='mt-3'>
                <button class='btn-custom' onclick='prevMedia()'>Prev</button>
                <button class='btn-custom' onclick='nextMedia()'>Next</button>
            </div>
        </div>
    </div>

    <div class='hero'>
        <div class='hero-content'>
            <h1 class='display-1 fw-bold'>For Gloria ✨</h1>
        </div>
    </div>

    <div class='container py-5'>
        <div class='row'>
            <div class='col-md-4'>
                <div class='flip-card'>
                    <div class='flip-card-inner'>
                        <div class='flip-card-front'><h3>Strength</h3></div>
                        <div class='flip-card-back'><p>Your resilience inspires me.</p></div>
                    </div>
                </div>
            </div>
            <div class='col-md-4'>
                <div class='flip-card'>
                    <div class='flip-card-inner'>
                        <div class='flip-card-front'>
                            <video src='The_reel.mp4' autoplay muted loop style='width:100%; height:100%; object-fit:cover;'></video>
                        </div>
                        <div class='flip-card-back'>
                            <h3>Our Moments</h3>
                            <p>Captured forever.</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class='col-md-4'>
                <div class='flip-card'>
                    <div class='flip-card-inner'>
                        <div class='flip-card-front'><h3>Love</h3></div>
                        <div class='flip-card-back'><p>Always and forever.</p></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>

            const body = document.documentElement;
            const currentTheme = body.getAttribute('data-theme');
            body.setAttribute('data-theme', currentTheme === 'dark' ? 'light' : 'dark');
        }

        function openNav() { document.getElementById('memorySidebar').style.width = '350px'; }
        function closeNav() { document.getElementById('memorySidebar').style.width = '0'; }

        let currentIndex = 0;

        function updateGallery() {
            const container = document.getElementById('gallery-media-container');
            if (!galleryData.length) return;
            const item = galleryData[currentIndex];
            container.innerHTML = '';
            
            if (item.type === 'image') {
                const img = document.createElement('img');
                img.src = item.src;
                container.appendChild(img);
            } else {
                const video = document.createElement('video');
                video.src = item.src;
                video.controls = true;
                video.autoplay = true;
                container.appendChild(video);
            }
        }

        function nextMedia() { currentIndex = (currentIndex + 1) % galleryData.length; updateGallery(); }
        function prevMedia() { currentIndex = (currentIndex - 1 + galleryData.length) % galleryData.length; updateGallery(); }

        updateGallery();
    </script>
</body>
</html>
