
<!DOCTYPE html>
<html lang='en' data-theme='dark'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>For Gloria</title>
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #e0e0e0;
            --accent-color: #ff8fa3;
            --card-bg: #161616;
            --transition: all 0.3s ease;
        }

        [data-theme='light'] {
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --accent-color: #d63384;
            --card-bg: #ffffff;
        }

        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; transition: var(--transition); overflow-x: hidden; }

        .theme-toggle { position: fixed; top: 15px; right: 15px; z-index: 5000; padding: 12px; border-radius: 50%; background: var(--accent-color); border: none; cursor: pointer; font-size: 1.2rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* Side Gallery */
        #memorySidebar { height: 100%; width: 0; position: fixed; z-index: 4500; top: 0; left: 0; background: var(--card-bg); overflow-x: hidden; transition: 0.5s; border-right: 2px solid var(--accent-color); padding-top: 60px; }
        .side-tab-trigger { position: fixed; left: 0; top: 50%; transform: translateY(-50%); z-index: 2500; background: var(--accent-color); color: #000; padding: 20px 10px; cursor: pointer; writing-mode: vertical-rl; border-radius: 0 10px 10px 0; font-weight: bold; border: none; font-size: 0.9rem; }
        .closebtn { position: absolute; top: 10px; right: 25px; font-size: 36px; color: var(--text-color); text-decoration: none; }

        .hero { height: 60vh; background: url('Gloria_1.jpeg') center/cover no-repeat; display: flex; align-items: center; justify-content: center; position: relative; }
        .hero::before { content: ''; position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.4); }
        .hero-content { position: relative; z-index: 10; text-align: center; color: white; padding: 0 20px; }

        /* Journey Mobile-Friendly Layout */
        .journey-container { position: relative; max-width: 900px; margin: 30px auto; padding: 20px 10px; }
        .journey-container::after { content: ''; position: absolute; width: 2px; background-color: var(--accent-color); top: 0; bottom: 0; left: 50%; margin-left: -1px; opacity: 0.4; }
        .journey-item { padding: 10px 20px; position: relative; width: 50%; }
        .journey-item::after { content: '❤'; position: absolute; width: 20px; height: 20px; right: -10px; background-color: var(--bg-color); border: 2px solid var(--accent-color); top: 20px; border-radius: 50%; z-index: 1; color: var(--accent-color); font-size: 10px; text-align: center; line-height: 16px; }
        .left { left: 0; text-align: right; }
        .right { left: 50%; text-align: left; }
        .right::after { left: -10px; }
        .journey-frame { border: 2px solid var(--accent-color); border-radius: 15px; overflow: hidden; background: var(--card-bg); }
        .journey-frame img { width: 100%; height: 200px; object-fit: cover; }

        /* Flip Card */
        .flip-card { background-color: transparent; width: 100%; height: 350px; perspective: 1000px; margin-bottom: 20px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .flip-card-front { background: var(--card-bg); border: 1px solid var(--accent-color); }
        .flip-card-back { background: var(--accent-color); color: #000; transform: rotateY(180deg); }

        .gallery-container-inner { padding: 15px; text-align: center; }
        #gallery-media-container img, #gallery-media-container video { width: 100%; max-height: 350px; object-fit: contain; border-radius: 10px; }

        .btn-custom { background: var(--accent-color); color: #000; font-weight: bold; border-radius: 30px; padding: 10px 20px; border: none; cursor: pointer; margin: 5px; font-size: 0.9rem; }

        @media (max-width: 768px) {
            .journey-container::after { left: 31px; }
            .journey-item { width: 100%; padding-left: 70px; padding-right: 25px; text-align: left !important; }
            .journey-item::after { left: 21px; right: auto; }
            .right { left: 0; }
            .hero { height: 40vh; }
            .display-1 { font-size: 2.5rem; }
            #memorySidebar { width: 0; max-width: 100%; }
        }
    </style>
</head>
<body>
    <button class='theme-toggle' onclick='toggleTheme()'>🌓</button>
    <button class='side-tab-trigger' onclick='openNav()'>✨ GALLERY</button>

    <div id='memorySidebar' class='sidebar'>
        <a href='javascript:void(0)' class='closebtn' onclick='closeNav()'>&times;</a>
        <div class='gallery-container-inner'>
            <h3 class='mb-4'>Our Memories</h3>
            <div id='gallery-media-container'></div>
            <div class='mt-3'>
                <button class='btn-custom' onclick='prevMedia()'>Prev</button>
                <button class='btn-custom' onclick='nextMedia()'>Next</button>
            </div>
        </div>
    </div>

    <div class='hero'>
        <div class='hero-content'>
            <h1 class='display-1 fw-bold'>For Gloria ✨</h1>
        </div>
    </div>

    <div class='container py-5'>
        <h2 class='text-center mb-4'>Our Journey</h2>
        <div class='journey-container'>
            <div class='journey-item left'>
                <div class='journey-frame'>
                    <img src='Gloria_2.jpeg'>
                    <div class='p-3'><h6>Started Here</h6><p class='small'>Our first chapter.</p></div>
                </div>
            </div>
            <div class='journey-item right'>
                <div class='journey-frame'>
                    <img src='Together_1.jpeg'>
                    <div class='p-3'><h6>Building Us</h6><p class='small'>Every day is a gift.</p></div>
                </div>
            </div>
            <div class='journey-item left'>
                <div class='journey-frame'>
                    <img src='Gloria_3.jpeg'>
                    <div class='p-3'><h6>Forever</h6><p class='small'>Hand in hand.</p></div>
                </div>
            </div>
        </div>
    </div>

    <div class='container pb-5'>
        <div class='row g-3'>
            <div class='col-12 col-md-4'>
                <div class='flip-card' onclick='this.classList.toggle("flipped")'>
                    <div class='flip-card-inner'>
                        <div class='flip-card-front'><h3>Strength</h3></div>
                        <div class='flip-card-back'><p>You inspire me.</p></div>
                    </div>
                </div>
            </div>
            <div class='col-12 col-md-4'>
                <div class='flip-card' id='videoCard' onclick='toggleVideoFlip(this)'>
                    <div class='flip-card-inner'>
                        <div class='flip-card-front'>
                            <img src='Gloria_1.jpeg' style='width:100%; height:100%; object-fit:cover; border-radius:15px;' />
                        </div>
                        <div class='flip-card-back'>
                            <video id='reelVideo' src='The_reel.mp4' loop style='width:100%; height:100%; object-fit:cover; border-radius:15px;'></video>
                        </div>
                    </div>
                </div>
            </div>
            <div class='col-12 col-md-4'>
                <div class='flip-card' onclick='this.classList.toggle("flipped")'>
                    <div class='flip-card-inner'>
                        <div class='flip-card-front'><h3>Love</h3></div>
                        <div class='flip-card-back'><p>Always.</p></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.documentElement;
            const currentTheme = body.getAttribute('data-theme');
            body.setAttribute('data-theme', currentTheme === 'dark' ? 'light' : 'dark');
        }

        function openNav() { document.getElementById('memorySidebar').style.width = window.innerWidth < 768 ? '100%' : '350px'; }
        function closeNav() { document.getElementById('memorySidebar').style.width = '0'; }

        function toggleVideoFlip(card) {
            const video = document.getElementById('reelVideo');
            card.classList.toggle('flipped');
            if (card.classList.contains('flipped')) {
                video.play();
            } else {
                video.pause();
            }
        }

        let currentIndex = 0;

        function updateGallery() {
            const container = document.getElementById('gallery-media-container');
            if (!galleryData.length) return;
            const item = galleryData[currentIndex];
            container.innerHTML = '';
            if (item.type === 'image') {
                const img = document.createElement('img');
                img.src = item.src;
                container.appendChild(img);
            } else {
                const video = document.createElement('video');
                video.src = item.src;
                video.controls = true;
                container.appendChild(video);
            }
        }

        function nextMedia() { currentIndex = (currentIndex + 1) % galleryData.length; updateGallery(); }
        function prevMedia() { currentIndex = (currentIndex - 1 + galleryData.length) % galleryData.length; updateGallery(); }

        updateGallery();
    </script>
</body>
</html>
