    <style>
        :root { --bg-color: #0f0f0f; --text-color: #e0e0e0; --accent-color: #ff8fa3; --card-bg: #161616; }

        .hero { height: 100vh; background: url('Gloria_1.jpeg') center/cover no-repeat; display: flex; align-items: center; justify-content: center; position: relative; }
        .hero::before { content: ''; position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); }
        .hero-content { position: relative; z-index: 10; text-align: center; }
        #memorySidebar { height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; left: 0; background: #111; overflow-x: hidden; transition: 0.5s; border-right: 2px solid var(--accent-color); }
        .side-tab-trigger { position: fixed; left: 0; top: 50%; transform: translateY(-50%); z-index: 1500; background: var(--accent-color); color: #000; padding: 25px 12px; cursor: pointer; writing-mode: vertical-rl; border-radius: 0 10px 10px 0; font-weight: bold; border: none; }
        .gallery-img { border-radius: 15px; width: 100%; height: auto; margin-bottom: 15px; border: 1px solid var(--accent-color); }
        .main-carousel-item img { border-radius: 20px; width: 100%; height: 500px; object-fit: cover; border: 2px solid var(--accent-color); }
        h1 { font-size: 5rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.7); }
    </style>
</head>

        function openNav() { document.getElementById('memorySidebar').style.width = '350px'; }
        function closeNav() { document.getElementById('memorySidebar').style.width = '0'; }

        $(document).ready(function() {
            const owl = $('#main-gallery');
            const sidebar = $('#sidebar-content');
            galleryData.forEach(item => {
                if(item.type === 'image') {
                    owl.append(`<div class='item main-carousel-item'><img src='${item.src}'></div>`);
                    sidebar.append(`<img src='${item.src}' class='gallery-img'>`);
                }
            });
            owl.owlCarousel({ loop: true, margin: 20, items: 1, autoplay: true, autoplayTimeout: 3000 });

            const phrases = ["You are amazing.", "Every moment is a gift.", "Specifically for you."];
            let i = 0, j = 0; const el = document.getElementById('typewriter');
            function type() {
                if (j < phrases[i].length) { el.innerHTML += phrases[i][j++]; setTimeout(type, 100); }
                else { setTimeout(() => { el.innerHTML = ''; j = 0; i = (i + 1) % phrases.length; type(); }, 2000); }
            }
            type();
        });
    </script>
