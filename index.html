<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <style>
        body { 
            background: #fffafa; /* Very light rose white */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card { 
            text-align: center; 
            padding: 50px 30px; 
            border-radius: 30px; 
            background: white;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.1);
            max-width: 400px;
            width: 90%;
            border: 1px solid #ffe5ec;
        }
        .heart { font-size: 60px; color: #ff4d6d; margin-bottom: 10px; }
        h1 { color: #333; font-weight: 400; letter-spacing: 1px; }
        p { color: #666; font-size: 18px; line-height: 1.8; margin-bottom: 25px; }
        .signature { font-style: italic; color: #ff4d6d; font-weight: bold; }
        .footer { font-size: 12px; color: #ccc; margin-top: 30px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="card">
        <div class="heart">❤</div>
        <h1>I'm Sorry</h1>
        
        <p>
            I built this little space just to say I'm sorry. <br>
            I value us more than anything, and I want <br>
            to make things right between us.
        </p>
        
        <p class="signature">With love, [Your Name]</p>
        <div class="footer">Made specifically for you</div>
    </div>
</body>
</html>
