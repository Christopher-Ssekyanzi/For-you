<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message For You</title>
    <style>
        body {
            background-color: #fdfbfb;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #4a4a4a;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 500px;
        }
        h1 { color: #d63031; font-weight: 300; }
        p { line-height: 1.8; font-size: 1.1em; }
        .heart { font-size: 40px; color: #d63031; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="heart">♥</div>
        <h1>I'm Sorry</h1>
        <p>I wanted to take a moment to put my thoughts in one place.</p>
        <p>You mean more to me than words can say, and I'm committed to making this right.</p>
        <p>Can we talk soon?</p>
    </div>
</body>
</html>
