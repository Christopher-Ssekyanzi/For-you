<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Gloria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            /* --- COLOR PALETTE --- */
            --bg-color: #0f0f0f; 
            --text-color: #e0e0e0;
            --accent-color: #ff8fa3; 
            --card-bg: #161616;
            --glass-bg: rgba(255, 143, 163, 0.15);
            --line-color: rgba(255, 143, 163, 0.2);
        }

        [data-theme="light"] {
            --bg-color: #fff9f6;
            --text-color: #1a1a1a;
            --accent-color: #9e0031;
            --card-bg: #ffffff;
        }

        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            transition: background 0.5s ease, color 0.5s ease;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- HERO & LAYOUT FIXES --- */
        .hero-content { 
            position: relative; 
            z-index: 10; 
            width: 100%;
            padding: 0 20px;
        }
        .main-title {
            min-height: 1.2em; /* Prevents words from jumping/overlapping when typing */
            margin-bottom: 15px;
            line-height: 1.1;
        }
        .cursor { color: var(--accent-color); animation: blink 0.7s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .hero-aura {
            pointer-events: none;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: clamp(200px, 60vw, 450px); 
            height: clamp(200px, 60vw, 450px); 
            background: var(--accent-color);
            filter: blur(100px); opacity: 0.15; border-radius: 50%;
            animation: pulse-aura 4s infinite alternate; z-index: -1;
        }
        @keyframes pulse-aura { 
            from { transform: translate(-50%, -50%) scale(0.8); opacity: 0.1; } 
            to { transform: translate(-50%, -50%) scale(1.1); opacity: 0.2; } 
        }

        .floating-text { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* --- SCROLL INDICATOR --- */
        .scroll-down { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); opacity: 0.6; }
        .mouse { width: 20px; height: 35px; border: 2px solid var(--text-color); border-radius: 15px; position: relative; margin: 0 auto 5px; }
        .wheel { width: 3px; height: 6px; background: var(--accent-color); position: absolute; top: 6px; left: 50%; transform: translateX(-50%); border-radius: 2px; animation: scroll-wheel 1.5s infinite; }
        @keyframes scroll-wheel { 0% { top: 6px; opacity: 1; } 100% { top: 20px; opacity: 0; } }

        /* --- MOBILE SIDEBAR --- */
        #memorySidebar {
            height: 100%; width: 0; position: fixed; z-index: 2100; top: 0; left: 0;
            background: var(--bg-color); overflow-x: hidden;
            transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            border-right: 2px solid var(--accent-color);
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        #sidebarOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%;
            height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(3px); z-index: 2000;
        }
        .side-tab-trigger {
            position: fixed; left: 0; top: 50%; transform: translateY(-50%);
            z-index: 1500; background: var(--glass-bg); backdrop-filter: blur(12px);
            color: var(--accent-color); padding: 25px 12px; border-radius: 0 20px 20px 0;
            cursor: pointer; writing-mode: vertical-rl; text-orientation: mixed;
            font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
            font-size: 0.7rem; border: 1px solid var(--accent-color); border-left: none;
        }

        /* --- TIMELINE --- */
        .timeline { position: relative; max-width: 900px; margin: 40px auto; padding: 20px 0; }
        .timeline::after { 
            content: ''; position: absolute; width: 2px; background: var(--line-color); 
            top: 0; bottom: 0; left: 50%; margin-left: -1px; 
        }
        .timeline-item { padding: 10px 40px; position: relative; width: 50%; }
        .timeline-item.left { left: 0; text-align: right; }
        .timeline-item.right { left: 50%; text-align: left; }
        .timeline-img-wrapper {
            width: 100%; border-radius: 20px; overflow: hidden;
            border: 4px solid var(--card-bg); box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            aspect-ratio: 4/3;
        }
        .timeline-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .timeline-text { margin-top: 15px; font-weight: 600; font-size: 1.1rem; }

        /* --- FLIP CARDS --- */
        .flip-card { background-color: transparent; width: 100%; height: 320px; perspective: 1500px; cursor: pointer; }
        .flip-card-inner {
            position: relative; width: 100%; height: 100%; text-align: center;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 25px; padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .flip-card-front { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); }
        .flip-card-back { background: var(--accent-color); color: #000; transform: rotateY(180deg); }

        /* --- BUTTONS & THEME --- */
        .theme-switch {
            position: fixed; top: 20px; right: 20px; z-index: 3000;
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--accent-color); padding: 10px;
            border-radius: 50%; cursor: pointer; transition: 0.3s;
        }
        .btn-romantic { background: var(--accent-color); color: #000 !important; border-radius: 50px; padding: 15px 30px; font-weight: 800; border: none; }
        .section-title { color: var(--accent-color); font-weight: 800; margin-bottom: 50px; display: inline-block; }

        .heart-particle { position: fixed; pointer-events: none; z-index: 9999; animation: fly-up 1.5s forwards; font-size: 1.2rem; }
        @keyframes fly-up {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tw-x), var(--tw-y)) scale(0); opacity: 0; }
        }

        @media (max-width: 768px) {
            .timeline::after { left: 31px; }
            .timeline-item { width: 100%; padding-left: 70px; text-align: left !important; left: 0 !important; }
            .display-1 { font-size: 3.5rem; }
        }
    </style>
</head>
<body onmousemove="handleMouseMove(event)">

    <button class="theme-switch" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <div id="sidebarOverlay" onclick="closeNav()"></div>

    <div id="memorySidebar">
        <div class="p-3 d-flex justify-content-between align-items-center" style="border-bottom: 1px solid rgba(255,255,255,0.1);">
            <span style="color: var(--accent-color); font-weight: 700; font-size: 0.9rem; letter-spacing: 1px;">OUR GALLERY</span>
            <a href="javascript:void(0)" style="font-size: 2.5rem; text-decoration: none; color: var(--accent-color); line-height: 0.8;" onclick="closeNav()">×</a>
        </div>
        <div class="sidebar-content" style="max-width: 330px; padding: 30px 20px; text-align: center; margin: 0 auto;">
            <div style="width: 100%; aspect-ratio: 1; border-radius: 20px; overflow: hidden; margin-bottom: 25px; background: #000; border: 1px solid var(--accent-color);">
                <img id="sidebarImg" src="Together_1.jpeg" style="width:100%; height:100%; object-fit:cover; transition:0.5s;">
            </div>
            <button class="btn btn-romantic w-100 py-3" onclick="nextImage()">Next Memory →</button>
            <p class="mt-4 opacity-50 small" style="cursor:pointer;" onclick="closeNav()">← Tap to exit</p>
        </div>
    </div>

    <div class="side-tab-trigger" onclick="openNav()">✨ OPEN GALLERY</div>

    <header class="container text-center d-flex align-items-center justify-content-center" style="min-height: 100vh; position: relative;">

            <div class="hero-aura"></div>
            
            <h1 class="display-1 fw-bold main-title">
                <span id="typewriter"></span><span class="cursor">|</span>
            </h1>
            
            <p class="fs-4 opacity-75 mt-2 floating-text" style="max-width: 600px; margin: 0 auto;">
                Every moment with you is a favorite memory.
            </p>
            
            <div class="scroll-down">
                <div class="mouse"><div class="wheel"></div></div>
                <p class="small mt-2 opacity-50">Scroll down</p>
            </div>
        </div>
    </header>

    <section class="py-5 text-center">
        <div class="container">
            <h2 class="section-title" data-aos="fade-up">A song for you😮‍💨</h2>
            <div class="ratio ratio-16x9 mb-4" style="max-width:850px; margin:auto; border-radius:20px; overflow:hidden; border:4px solid var(--card-bg);">
                <iframe src="https://www.youtube.com/embed/yKNxeF4KMsY?rel=0" allowfullscreen></iframe>
            </div>
            <a href="https://open.spotify.com/track/7i9p7yXzS9ZtXvG3XzJvX9" target="_blank" class="spotify-link-card" data-aos="fade-up" style="text-decoration:none;">
                <div class="d-flex align-items-center p-4">
                    <div class="text-start">
                        <h4 class="mb-0 fw-bold">Yellow - Coldplay</h4>
                        <p class="mb-0 opacity-75">Listen on Spotify</p>
                    </div>
                </div>
            </a>
        </div>
    </section>

                    <p class="timeline-text">Where it started</p>
                </div>
                <div class="timeline-item right" data-aos="fade-left">
                    <div class="timeline-img-wrapper"><img src="Together_2.jpeg"></div>
                    <p class="timeline-text">The first laugh</p>
                </div>
                <div class="timeline-item left" data-aos="fade-right">
                    <div class="timeline-img-wrapper"><img src="Gloria_2.jpeg"></div>
                    <p class="timeline-text">A special day</p>
                </div>
                <div class="timeline-item right" data-aos="fade-left">
                    <div class="timeline-img-wrapper"><img src="Together_3.jpeg"></div>
                    <p class="timeline-text">Moments in time</p>
                </div>
                <div class="timeline-item left" data-aos="fade-right">
                    <div class="timeline-img-wrapper"><img src="Together_4.jpeg"></div>
                    <p class="timeline-text">Adventures</p>
                </div>
