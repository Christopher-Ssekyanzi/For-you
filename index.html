<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message for You</title>
    <style>
        body { 
            background: #fff0f3; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: 'Arial', sans-serif;
            overflow: hidden; /* Keeps the "No" button from making the page scroll */
        }
        .card { 
            text-align: center; 
            padding: 30px; 
            border-radius: 20px; 
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 85%;
            position: relative;
        }
        img { 
            width: 100%; 
            border-radius: 15px; 
            margin-bottom: 20px; 
            border: 2px solid #ff4d6d;
        }
        h2 { color: #333; margin-bottom: 20px; }
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        #yesBtn { background: #ff4d6d; color: white; }
        #noBtn { 
            background: #f0f0f0; 
            color: #333; 
            position: absolute; /* Needed for the jumping effect */
        }
        #success-msg { display: none; color: #ff4d6d; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://via.placeholder.com/400x300?text=Insert+Our+Photo+Here" alt="Us">
        
        <h2>Will you pardon my actions?</h2>
        
        <div class="btn-container">
            <button id="yesBtn" onclick="pardon()">Yes</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No</button>
        </div>

        <div id="success-msg">
            <p>Yay! I knew you couldn't say no. ❤️<br>I'll make it up to you, I promise.</p>
        </div>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            // Calculate random position
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function pardon() {
            document.getElementById('success-msg').style.display = 'block';
            document.getElementById('noBtn').style.display = 'none';
            document.getElementById('yesBtn').style.display = 'none';
            // Optional: Celebrate with an alert
            alert("Best decision ever! I love you.");
        }
    </script>

</body>
</html>
