<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message for You</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #fff0f3; /* Soft pink background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; /* Prevents scrollbars when button jumps */
        }
        .card {
            max-width: 500px;
            width: 90%;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            border: none;
            overflow: visible; /* Allows button to jump outside card if needed */
        }
        .card-img-top {
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            height: 300px;
            object-fit: cover;
        }
        #noBtn {
            position: absolute;
            transition: 0.1s;
            z-index: 999;
        }
    </style>
</head>
<body>

    <div class="card p-4">
        <img src="PASTE_YOUR_POSTIMAGES_DIRECT_LINK_HERE" class="card-img-top" alt="Us">
        
        <div class="card-body text-center">
            <h2 class="card-title">Will you pardon me?</h2>
            <p class="card-text text-muted">
                I know I messed up, but I'm committed to making it up to you. 
                I built this just to show you I'm not giving up.
            </p>
            
            <div class="d-flex justify-content-center gap-3 mt-4">
                <button id="yesBtn" class="btn btn-danger btn-lg" onclick="handleYes()">Yes, I do</button>
                <button id="noBtn" class="btn btn-outline-secondary btn-lg" onmouseover="moveNo()">No</button>
            </div>

            <div id="successMsg" class="alert alert-success mt-4" style="display:none;">
                ❤️ I knew you'd say yes! I love you.
            </div>
        </div>
    </div>

    <script>
        function moveNo() {
            const noBtn = document.getElementById('noBtn');
            // Move button to a random spot on the screen
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function handleYes() {
            document.getElementById('successMsg').style.display = 'block';
            document.getElementById('noBtn').style.display = 'none';
            document.getElementById('yesBtn').disabled = true;
            alert("Best decision ever! Let's talk? ❤️");
        }
    </script>
</body>
</html>
