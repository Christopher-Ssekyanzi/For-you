
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Gloria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css">
    <style>
        :root { --bg-color: #0f0f0f; --text-color: #e0e0e0; --accent-color: #ff8fa3; --card-bg: #161616; --glass-bg: rgba(255, 143, 163, 0.15); --line-color: rgba(255, 143, 163, 0.2); }
        [data-theme="light"] { --bg-color: #fff9f6; --text-color: #1a1a1a; --accent-color: #9e0031; --card-bg: #ffffff; --glass-bg: rgba(158, 0, 49, 0.1); --line-color: rgba(158, 0, 49, 0.2); }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; overflow-x: hidden; }
        .glide-in { display: inline-block; animation: glideIn 1.5s ease-out forwards; }
        @keyframes glideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        #memorySidebar { height: 100%; width: 0; position: fixed; z-index: 2100; top: 0; left: 0; background: var(--bg-color); overflow-x: hidden; transition: 0.5s; border-right: 2px solid var(--accent-color); }
        .side-tab-trigger { position: fixed; left: 0; top: 50%; transform: translateY(-50%); z-index: 1500; background: var(--glass-bg); padding: 25px 12px; cursor: pointer; writing-mode: vertical-rl; border: 1px solid var(--accent-color); }
        .timeline { position: relative; max-width: 900px; margin: 50px auto; }
        .timeline-img-wrapper { width: 100%; border-radius: 20px; overflow: hidden; aspect-ratio: 4/3; }
        .timeline-slideshow-wrapper { width: 100%; border-radius: 20px; overflow: hidden; aspect-ratio: 4/3; }
        .flip-card { height: 320px; perspective: 1500px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 25px; display: flex; align-items: center; justify-content: center; }
        .flip-card-back { transform: rotateY(180deg); background: var(--accent-color); color: #000; }
        .btn-romantic { background: var(--accent-color); color: #000; border-radius: 50px; padding: 15px 40px; border: none; }
    </style>
</head>
<body>
    <button class="theme-switch" onclick="toggleTheme()" style="position:fixed; top:20px; right:20px; z-index:3000;">🌙</button>
    <div id="memorySidebar">

    </section>

        function initSlideshow(id, count, typeFilter, extFilter) {
            console.log('Initializing slideshow:', id);
            const target = document.getElementById(id);
            if (!target) return;
            const items = gallery.filter(i => (!typeFilter || i.type === typeFilter) && (!extFilter || i.src.endsWith(extFilter))).slice(0, count);
            let html = '';
            items.forEach(i => { html += `<div class="item"><img src="${i.src}" style="width:100%"></div>`; });
            target.innerHTML = html;
            $(`#${id}`).owlCarousel({ loop: true, autoplay: true, items: 1 });
        }
        window.onload = () => { initSlideshow('slideshow-3', 4, 'image', 'jpeg'); };

        function closeNav() { document.getElementById("memorySidebar").style.width = "0"; }
        function toggleTheme() { document.body.dataset.theme = document.body.dataset.theme === 'light' ? 'dark' : 'light'; }
