<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey Section - Aurora Effect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --accent-pink: #ff8fa3;
            --accent-gold: #ffdb00;
            --accent-blue: #375a7f;
            --card-bg: rgba(22, 22, 22, 0.8);
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: sans-serif;
            margin: 0;
        }

        /* --- THE AURORA BACKGROUND --- */
        .journey-wrapper {
            position: relative;
            padding: 100px 0;
            background-color: var(--bg-dark);
            overflow: hidden; /* Keeps the large animated mesh inside the section */
        }

        .aurora-bg {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: 1; /* Stay behind the timeline */
            /* Layered radial gradients for the mesh look */
            background: radial-gradient(circle at 50% 50%, var(--accent-pink), transparent 50%),
                        radial-gradient(circle at 80% 20%, var(--accent-gold), transparent 40%),
                        radial-gradient(circle at 10% 80%, var(--accent-blue), transparent 50%);
            filter: blur(80px); /* Smooths the edges of the colors */
            opacity: 0.25; /* Keeps it subtle */
            animation: aurora-rotation 30s linear infinite;
        }

        @keyframes aurora-rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- CONTENT STYLING --- */
        .journey-content {
            position: relative;
            z-index: 10; /* Ensures content is above the aurora */
        }

        .timeline-item {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px); /* Makes the cards feel part of the aurora */
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .timeline-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .timeline-body {
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="journey-wrapper">
        <div class="aurora-bg"></div>
        
        <div class="container journey-content">
            <h2 class="text-center mb-5">Our Journey</h2>
            
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="timeline-item">
                        <img src="https://via.placeholder.com/800x400" class="timeline-img" alt="Milestone 1">
                        <div class="timeline-body">
                            <h4>Chapter One</h4>
                            <p>This is where the adventure began. A brief description of the memory or event that started the journey.</p>
                        </div>
                    </div>

                    <div class="timeline-item">
                        <img src="https://via.placeholder.com/800x400" class="timeline-img" alt="Milestone 2">
                        <div class="timeline-body">
                            <h4>Chapter Two</h4>
                            <p>As time went on, things became even more exciting. A significant milestone that shaped the path forward.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
