<!DOCTYPE html>
<html lang='en' data-theme='dark'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>For Gloria</title>
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #e0e0e0;
            --accent-color: #ff8fa3;
            --card-bg: #161616;
            --transition: all 0.3s ease;
        }
        [data-theme='light'] {
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --accent-color: #d63384;
            --card-bg: #ffffff;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            transition: var(--transition);
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* Theme Toggle with Visibility Control */
        .theme-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 5000;
            padding: 15px;
            border-radius: 50%;
            background: var(--accent-color);
            color: #000;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: opacity 0.3s ease;
        }
        .theme-toggle.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .side-tab-trigger {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 2500;
            background: var(--accent-color);
            color: #000;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            font-size: 1.5rem;
        }

        #memorySidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 4500;
            top: 0;
            left: 0;
            background: var(--card-bg);
            overflow-x: hidden;
            transition: 0.5s;
            border-right: 2px solid var(--accent-color);
        }

        .gallery-container-inner {
            padding: 20px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        #gallery-media-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }

        /* Gallery Control Panel */
        .gallery-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 20px 0;
        }

        .btn-gallery {
            padding: 12px;
            font-weight: bold;
            border-radius: 10px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .hero {
            min-height: 80vh;
            background: url('Gloria_1.jpeg') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .hero::before {
            content: '';
            position: absolute;
            top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.3);
        }
        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: white;
            padding: 0 20px;
        }

        .journey-frame img {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: cover;
        }

        .flip-card {
            height: 350px;
            perspective: 1000px;
            margin-bottom: 20px;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .flip-card-front { background: var(--card-bg); border: 1px solid var(--accent-color); }
        .flip-card-back { background: var(--accent-color); color: #000; transform: rotateY(180deg); }

        @media (max-width: 768px) {
            .hero { min-height: 60vh; }
            .display-1 { font-size: 3rem; }
            .flip-card { height: 280px; }
        }
    </style>
</head>
<body>
    <button class='theme-toggle' id='themeToggler' onclick='toggleTheme()'>🌓</button>
    <button class='side-tab-trigger' onclick='openNav()'>✨</button>

    <div id='memorySidebar'>
        <div class='gallery-container-inner'>
            <h3 class='text-center mt-3'>Memories</h3>
            
            <div id='gallery-media-container'></div>
            
            <div class='gallery-controls'>
                <button class='btn btn-outline-info btn-gallery' onclick='prevMedia()'>⬅ Prev</button>
                <button class='btn btn-outline-info btn-gallery' onclick='nextMedia()'>Next ➡</button>
                
                <button class='btn btn-primary btn-gallery' id='slideBtn' onclick='toggleSlideshow()'>▶ Play</button>
                
                <button class='btn btn-danger btn-gallery' onclick='closeNav()'>✖ Close</button>
            </div>
        </div>
    </div>

    <div class='hero'>
        <div class='hero-content'>
            <h1 class='display-1 fw-bold'>For Gloria ✨</h1>
        </div>
    </div>

    <script>
        const galleryData = [
            {"src": "WhatsApp Image 2026-04-20 at 16.17.12.jpeg", "type": "image"},
            {"src": "Gloria_1.jpeg", "type": "image"},
            {"src": "WhatsApp Video 2026-04-20 at 16.17.18.mp4", "type": "video"},
            {"src": "Together_1.jpeg", "type": "image"},
            {"src": "Gloria_3.jpeg", "type": "image"}
        ];

        let currentIndex = 0;
        let slideInterval = null;

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }

        function openNav() {
            document.getElementById('memorySidebar').style.width = "100%";
            document.getElementById('themeToggler').classList.add('hidden');
            updateGallery();
        }

        function closeNav() {
            stopSlideshow();
            document.getElementById('memorySidebar').style.width = "0";
            document.getElementById('themeToggler').classList.remove('hidden');
        }

        function updateGallery() {
            const container = document.getElementById('gallery-media-container');
            container.innerHTML = '';
            const item = galleryData[currentIndex];
            
            if(item.type === 'video') {
                let vid = document.createElement('video');
                vid.src = item.src; vid.controls = true; vid.style.width = '100%';
                container.appendChild(vid);
            } else {
                let img = document.createElement('img');
                img.src = item.src; img.style.width = '100%'; img.classList.add('rounded', 'shadow');
                container.appendChild(img);
            }
        }

        function nextMedia() {
            stopSlideshow();
            currentIndex = (currentIndex + 1) % galleryData.length;
            updateGallery();
        }

        function prevMedia() {
            stopSlideshow();
            currentIndex = (currentIndex - 1 + galleryData.length) % galleryData.length;
            updateGallery();
        }

        function toggleSlideshow() {
            const btn = document.getElementById('slideBtn');
            if (slideInterval) {
                stopSlideshow();
            } else {
                btn.innerText = "⏸ Pause";
                btn.classList.replace('btn-primary', 'btn-warning');
                slideInterval = setInterval(() => {
                    currentIndex = (currentIndex + 1) % galleryData.length;
                    updateGallery();
                }, 3000);
            }
        }

        function stopSlideshow() {
            if (slideInterval) {
                clearInterval(slideInterval);
                slideInterval = null;
                const btn = document.getElementById('slideBtn');
                btn.innerText = "▶ Play";
                btn.classList.replace('btn-warning', 'btn-primary');
            }
        }

        // Logic for flip cards and game remains same as your original index.html
        function toggleVideoFlip(card) {
            const v = card.querySelector('video');
            card.classList.toggle('flipped');
            if(card.classList.contains('flipped')) { v.play(); } else { v.pause(); }
        }
    </script>
</body>
</html>
